# gestoria-taxi · Orquestación Docker (App + DB)
# Uso: docker-compose --env-file .env.local up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestoria-taxi-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: gestoria-taxi-pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432" # Expuesto solo localmente para npx prisma
    volumes:
      - gestoria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gestoria} -d ${POSTGRES_DB:-gestoria_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gestoria_pgdata:
